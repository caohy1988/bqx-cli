name: bqx-analytics
description: >
  Top-level routing for bqx agent analytics workflows. Use this when the user
  wants to check agent health, evaluate sessions, or debug agent behavior in
  BigQuery, and you need to decide which analytics subcommand to use.
triggers:
  - "use bqx to check agent analytics"
  - "find bad sessions"
  - "debug agent behavior in BigQuery"
  - "what analytics commands are available"
  - "how do I monitor agents with bqx"
  - "check my agent health"
tools: []
