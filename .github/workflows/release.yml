name: Release

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/release.yml"
      - "scripts/package-npm.sh"
      - "scripts/check-version-sync.sh"
      - "npm/**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: Verify Version Sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml version: $VERSION"

      - name: Check version sync
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            bash scripts/check-version-sync.sh --tag "${{ github.ref_name }}"
          else
            bash scripts/check-version-sync.sh
          fi

  build-binaries:
    name: Build (${{ matrix.name }})
    needs: verify-version
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: darwin-arm64
            target: aarch64-apple-darwin
            runner: macos-latest
            pkg: bqx-darwin-arm64
            ext: ""
            archive: tar.gz
          - name: darwin-x64
            target: x86_64-apple-darwin
            runner: macos-latest
            pkg: bqx-darwin-x64
            ext: ""
            archive: tar.gz
          - name: linux-x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            pkg: bqx-linux-x64
            ext: ""
            archive: tar.gz
          - name: linux-arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            pkg: bqx-linux-arm64
            ext: ""
            archive: tar.gz
          - name: win32-x64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            pkg: bqx-win32-x64
            ext: ".exe"
            archive: zip
          - name: win32-arm64
            target: aarch64-pc-windows-msvc
            runner: windows-latest
            pkg: bqx-win32-arm64
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary for npm
        shell: bash
        run: |
          mkdir -p staging/${{ matrix.pkg }}
          cp target/${{ matrix.target }}/release/bqx${{ matrix.ext }} staging/${{ matrix.pkg }}/bqx${{ matrix.ext }}

      - name: Create release archive
        shell: bash
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          ARCHIVE_NAME="bqx-v${VERSION}-${{ matrix.name }}"
          mkdir -p release-archives

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            cd staging/${{ matrix.pkg }}
            7z a "../../release-archives/${ARCHIVE_NAME}.zip" "bqx${{ matrix.ext }}"
            cd ../..
          else
            tar -czf "release-archives/${ARCHIVE_NAME}.tar.gz" \
              -C staging/${{ matrix.pkg }} "bqx${{ matrix.ext }}"
          fi

      - name: Upload binary artifact (for npm packaging)
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.pkg }}
          path: staging/${{ matrix.pkg }}/
          retention-days: 7

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: release-archives/
          retention-days: 7

  package-npm:
    name: Package npm
    needs: [verify-version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*

      - name: Prepare artifact directory
        run: |
          mkdir -p staging
          for dir in artifacts/binary-*; do
            pkg_name="${dir#artifacts/binary-}"
            cp -r "$dir" "staging/$pkg_name"
            echo "Staged: $pkg_name"
            ls -la "staging/$pkg_name/"
          done

      - name: Package npm tarballs
        run: bash scripts/package-npm.sh --from-artifacts staging

      - name: Verify tarballs exist
        run: |
          echo "--- npm tarballs ---"
          ls -la dist/*.tgz
          EXPECTED=8  # 6 platform + 1 root + tolerance
          COUNT=$(ls dist/*.tgz | wc -l)
          if [[ "$COUNT" -lt 2 ]]; then
            echo "ERROR: expected at least 2 tarballs, got $COUNT"
            exit 1
          fi
          echo "Found $COUNT tarballs"

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs
          path: dist/*.tgz
          retention-days: 7

  checksums:
    name: Generate Checksums
    needs: [verify-version, build-binaries, package-npm]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Download npm tarballs
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: artifacts/npm-tarballs

      - name: Generate SHA256SUMS
        run: |
          mkdir -p release
          # Collect all release files
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.tgz" \) \
            -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release/SHA256SUMS
          retention-days: 7

  github-release:
    name: Create GitHub Release
    needs: [verify-version, build-binaries, package-npm, checksums]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Download npm tarballs
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: artifacts/npm-tarballs

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.tgz" -o -name "SHA256SUMS" \) \
            -exec cp {} release-assets/ \;
          echo "--- Release assets ---"
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: bqx ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/*

  publish-npm:
    name: Publish npm
    needs: [verify-version, package-npm, checksums, github-release]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm tarballs
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: tarballs

      - name: List tarballs
        run: ls -la tarballs/

      - name: Publish platform packages first
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          FAILED=0
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64 win32-arm64; do
            TGZ=$(ls tarballs/bqx-cli-${platform}-*.tgz 2>/dev/null | head -1)
            if [[ -z "$TGZ" ]]; then
              echo "ERROR: tarball not found for $platform"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo ">>> Publishing $TGZ ..."
            npm publish "$TGZ" --access public || {
              echo "ERROR: failed to publish $platform"
              FAILED=$((FAILED + 1))
            }
          done

          if [[ $FAILED -gt 0 ]]; then
            echo "FAILED: $FAILED platform package(s) failed to publish."
            echo "Aborting — root package will NOT be published."
            exit 1
          fi
          echo "All platform packages published."

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ROOT_TGZ=$(ls tarballs/bqx-0.*.tgz 2>/dev/null | head -1)
          if [[ -z "$ROOT_TGZ" ]]; then
            echo "ERROR: root tarball not found"
            exit 1
          fi
          echo ">>> Publishing $ROOT_TGZ ..."
          npm publish "$ROOT_TGZ" --access public
          echo "Root package published."
