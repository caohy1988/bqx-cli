name: Publish npm

# Triggered manually to publish npm packages from a successful release.
# Requires the release workflow to have completed and uploaded npm-tarballs.
#
# Automatic publishing is handled by the publish-npm job in release.yml.
# This workflow exists as a manual fallback if the automatic publish fails.
on:
  workflow_dispatch:
    inputs:
      release_run_id:
        description: "Run ID of the Release workflow that produced the tarballs"
        required: true
        type: string

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download npm tarballs
        uses: actions/download-artifact@v4
        with:
          name: npm-tarballs
          path: tarballs
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.release_run_id }}

      - name: List tarballs
        run: ls -la tarballs/

      - name: Publish platform packages first
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          FAILED=0
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64 win32-x64 win32-arm64; do
            TGZ=$(ls tarballs/dcx-cli-${platform}-*.tgz 2>/dev/null | head -1)
            if [[ -z "$TGZ" ]]; then
              echo "ERROR: tarball not found for $platform"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo ">>> Publishing $TGZ ..."
            npm publish "$TGZ" --access public || {
              echo "ERROR: failed to publish $platform"
              FAILED=$((FAILED + 1))
            }
          done

          if [[ $FAILED -gt 0 ]]; then
            echo "FAILED: $FAILED platform package(s) failed to publish."
            echo "Aborting — root package will NOT be published."
            exit 1
          fi
          echo "All platform packages published."

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ROOT_TGZ=$(ls tarballs/dcx-0.*.tgz 2>/dev/null | head -1)
          if [[ -z "$ROOT_TGZ" ]]; then
            echo "ERROR: root tarball not found"
            exit 1
          fi
          echo ">>> Publishing $ROOT_TGZ ..."
          npm publish "$ROOT_TGZ" --access public
          echo "Root package published."
