name: SDK Sync

on:
  schedule:
    # Run weekly on Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync upstream SDK contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest SDK and regenerate contract
        run: |
          ./scripts/update_analytics_sdk_contract.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- docs/ tests/fixtures/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Read upstream SHA
        if: steps.changes.outputs.changed == 'true'
        id: sha
        run: |
          SHA=$(cat tests/fixtures/upstream_sdk_latest/UPSTREAM_SHA | head -c 12)
          echo "short_sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="sdk-sync/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git add docs/analytics_sdk_contract.md \
                  tests/fixtures/analytics_sdk_contract.json \
                  tests/fixtures/upstream_sdk_latest/
          git commit -m "chore: sync SDK contract (upstream ${{ steps.sha.outputs.short_sha }})"
          git push -u origin "$BRANCH" --force

          # Ensure the sdk-sync label exists
          gh label create sdk-sync --description "Automated SDK sync PR" --color "1d76db" 2>/dev/null || true

          # Close any existing sdk-sync PRs to avoid duplicates
          gh pr list --label sdk-sync --state open --json number -q '.[].number' | \
            xargs -I {} gh pr close {} --comment "Superseded by newer sync." 2>/dev/null || true

          gh pr create \
            --title "chore: sync analytics SDK contract (${{ steps.sha.outputs.short_sha }})" \
            --body "$(cat <<'BODY'
          ## Automated SDK sync

          This PR was created by the weekly SDK sync workflow. It updates the
          checked-in upstream SDK fixtures and regenerates the compatibility
          contract.

          **Review the diff** to see what changed upstream and whether dcx
          needs any follow-up work.

          🤖 Generated by `.github/workflows/sdk-sync.yml`
          BODY
          )" \
            --label sdk-sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
